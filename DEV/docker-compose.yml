services:
  jirahub:
    build: .
    restart: unless-stopped
    ports:
      - "5152:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=JiraHubDb;Username=jirahub;Password=${DB_PASSWORD}
      - Jwt__Key=${JWT_KEY}
      - ASPNETCORE_ENVIRONMENT=Production
    depends_on:
      - postgres
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: JiraHubDb
      POSTGRES_USER: jirahub
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
volumes:
  postgres_data:
    name: jirahubdev_postgres_data
